<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G. Moschese | Digital Space</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #666666;
            --accent: #007aff;
            --bg: #fafafa;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: left;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Styling for the Abstract SVG */
        .brand-visual {
            margin-bottom: 2.5rem;
        }

        .abstract-svg {
            fill: none;
            stroke: var(--primary);
            stroke-width: 2.5;
            transition: all 0.3s ease;
        }

        .abstract-svg:hover {
            stroke: var(--accent);
            transform: scale(1.05);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
        }

        .role {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-top: 0.7rem;
            font-weight: 400;
        }

        .divider {
            width: 45px;
            height: 2px;
            background-color: var(--accent);
            margin: 2rem 0;
        }

        .status-box {
            display: inline-flex;
            align-items: center;
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .pulse {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 10px;
            box-shadow: 0 0 0 rgba(46, 204, 113, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0); }
        }

        .message {
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--secondary);
        }

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Abstract Visual Section -->
        <div class="brand-visual">
            <svg class="abstract-svg" width="64" height="64" viewBox="0 0 100 100">
                <circle cx="50" cy="50" r="12"/>
                <line x1="50" y1="10" x2="50" y2="30"/>
                <line x1="50" y1="70" x2="50" y2="90"/>
                <line x1="10" y1="50" x2="30" y2="50"/>
                <line x1="70" y1="50" x2="90" y2="50"/>
                <line x1="22" y1="22" x2="36" y2="36"/>
                <line x1="64" y1="64" x2="78" y2="78"/>
                <line x1="78" y1="22" x2="64" y2="36"/>
                <line x1="36" y1="64" x2="22" y2="78"/>
            </svg>
        </div>

        <div class="status-box">
            <span class="pulse"></span> System: Building in progress
        </div>

        <h1>G. Moschese</h1>
        <div class="role">Software Developer & Tech Enthusiast</div>
        
        <div class="divider"></div>

        <div class="message">
            Currently architecting a new digital environment. <br>
            A minimal space focused on logic and design.
        </div>

        <footer>
            &copy; 2026 &mdash; Built with GitHub Pages
        </footer>
    </div>
</body>
</html>
