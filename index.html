<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanni Moschese | Portfolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">
    <header class="main-header">
        <div class="brand-visual">
            <svg class="neural-svg" width="100" height="260" viewBox="0 0 100 260">
                <g class="connections">
                    <line class="synapse" x1="25" y1="40" x2="50" y2="100" />
                    <line class="synapse" x1="75" y1="40" x2="50" y2="100" />
                    <line class="synapse" x1="50" y1="100" x2="50" y2="160" />
                    <line class="synapse" x1="50" y1="160" x2="25" y2="220" />
                    <line class="synapse" x1="50" y1="160" x2="75" y2="220" />
                </g>
                <g class="nodes">
                    <g class="node-group" data-section="stack"><circle class="hitbox" cx="25" cy="40" r="15" /><circle class="neuron" cx="25" cy="40" r="3" /></g>
                    <g class="node-group" data-section="lab"><circle class="hitbox" cx="75" cy="40" r="15" /><circle class="neuron" cx="75" cy="40" r="3" /></g>
                    <g class="node-group" data-section="ai"><circle class="hitbox" cx="50" cy="100" r="15" /><circle class="neuron" cx="50" cy="100" r="3" /></g>
                    <g class="node-group" data-section="log"><circle class="hitbox" cx="50" cy="160" r="15" /><circle class="neuron" cx="50" cy="160" r="3" /></g>
                    <g class="node-group" data-section="opensource"><circle class="hitbox" cx="25" cy="220" r="15" /><circle class="neuron" cx="25" cy="220" r="3" /></g>
                    <g class="node-group" data-section="about"><circle class="hitbox" cx="75" cy="220" r="15" /><circle class="neuron" cx="75" cy="220" r="3" /></g>
                </g>
            </svg>
        </div>
        <div class="hero-text">
            <div class="status-box"><span class="pulse-dot"></span> System: Active</div>
            <h1>Giovanni<br>Moschese</h1>
            <p class="role">Data Engineer • AI Systems</p>
            <div class="divider"></div>
            <p class="message" id="dynamic-text">Designing systems where data flows, learns, and becomes decisions.</p>
        </div>
    </header>
</div>
<script src="script.js"></script>
</body>
</html>
