<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanni Moschese | Illungo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
    <!-- Sostituisci solo la sezione <header> nel tuo index.html -->
<header class="main-header">
    <div class="brand-visual">
    <svg class="neural-svg" width="100" height="240" viewBox="0 0 100 240" xmlns="http://www.w3.org/2000/svg">
        <!-- Connessioni (Synapses) -->
        <g class="connections">
            <!-- Collegamenti tra Livello 1 e 2 -->
            <line class="synapse" x1="20" y1="40" x2="50" y2="80" />
            <line class="synapse" x1="80" y1="40" x2="50" y2="80" />
            <line class="synapse" x1="20" y1="40" x2="50" y2="120" />
            <line class="synapse" x1="80" y1="40" x2="50" y2="120" />
            
            <!-- Collegamenti tra Livello 2 e 3 -->
            <line class="synapse" x1="50" y1="80" x2="20" y2="180" />
            <line class="synapse" x1="50" y1="80" x2="80" y2="180" />
            <line class="synapse" x1="50" y1="120" x2="20" y2="180" />
            <line class="synapse" x1="50" y1="120" x2="80" y2="180" />
            <line class="synapse" x1="50" y1="160" x2="20" y2="180" />
            <line class="synapse" x1="50" y1="160" x2="80" y2="180" />
        </g>

        <!-- Nodi (Neurons) -->
        <g class="nodes">
            <!-- Input Layer -->
            <circle class="neuron" cx="20" cy="40" r="4" />
            <circle class="neuron" cx="80" cy="40" r="4" />
            
            <!-- Hidden Layer -->
            <circle class="neuron" cx="50" cy="80" r="4" />
            <circle class="neuron" cx="50" cy="120" r="4" />
            <circle class="neuron" cx="50" cy="160" r="4" />
            
            <!-- Output Layer -->
            <circle class="neuron" cx="20" cy="180" r="4" />
            <circle class="neuron" cx="80" cy="180" r="4" />
        </g>
    </svg>
</div>

    <div class="hero-text">
        <div class="status-box">
            <span class="pulse"></span> System: Online
        </div>
        <div class="alias">Known as Illungo</div>
        <h1>Giovanni<br>Moschese</h1>
        <p class="role">Software Developer & Tech Enthusiast</p>
        
        <div class="divider"></div>
        
        <p class="message">
            Currently architecting a new digital environment.<br>
            A minimal space focused on logic and design.
        </p>
    </div>
</header>

        <footer>
            &copy; 2026 &mdash; Built with GitHub Pages
        </footer>
    </div>
</body>
</html>
