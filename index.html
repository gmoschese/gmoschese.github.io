<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G. Moschese | Digital Space</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #666666;
            --accent: #007aff;
            --bg: #fafafa;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: left;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .brand-visual {
            margin-bottom: 2.5rem;
        }

        .neural-svg {
            fill: var(--bg);
            stroke: var(--primary);
            stroke-width: 2;
        }

        .synapse {
            stroke-width: 1.5;
            opacity: 0.2;
        }

        .synapse-strong {
            stroke-width: 1.5;
            opacity: 0.6;
            stroke: var(--accent);
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
            line-height: 1;
        }

        .role {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-top: 0.7rem;
            font-weight: 400;
        }

        .divider {
            width: 45px;
            height: 2px;
            background-color: var(--accent);
            margin: 2rem 0;
        }

        .status-box {
            display: inline-flex;
            align-items: center;
            background: #f0f0f0;
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #555;
            margin-bottom: 1.5rem;
        }

        .pulse {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 10px;
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0); }
        }

        .message {
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--secondary);
        }

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #bbb;
            text-transform: uppercase;
            letter-spacing: 1.5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand-visual">
            <svg class="neural-svg" width="80" height="60" viewBox="0 0 120 80">
                <!-- Sinapsi (Linee) -->
                <!-- Layer 1 to 2 -->
                <line class="synapse" x1="20" y1="20" x2="60" y2="20" />
                <line class="synapse-strong" x1="20" y1="20" x2="60" y2="40" />
                <line class="synapse" x1="20" y1="40" x2="60" y2="20" />
                <line class="synapse" x1="20" y1="40" x2="60" y2="40" />
                <line class="synapse" x1="20" y1="40" x2="60" y2="60" />
                <line class="synapse" x1="20" y1="60" x2="60" y2="40" />
                <line class="synapse-strong" x1="20" y1="60" x2="60" y2="60" />

                <!-- Layer 2 to 3 -->
                <line class="synapse" x1="60" y1="20" x2="100" y2="40" />
                <line class="synapse-strong" x1="60" y1="40" x2="100" y2="40" />
                <line class="synapse" x1="60" y1="60" x2="100" y2="40" />

                <!-- Neuroni (Cerchi) -->
                <!-- Input Layer -->
                <circle cx="20" cy="20" r="4" />
                <circle cx="20" cy="40" r="4" />
                <circle cx="20" cy="60" r="4" />
                <!-- Hidden Layer -->
                <circle cx="60" cy="20" r="4" />
                <circle cx="60" cy="40" r="4" />
                <circle cx="60" cy="60" r="4" />
                <!-- Output Layer -->
                <circle cx="100" cy="40" r="4" fill="var(--primary)" />
            </svg>
        </div>

        <div class="status-box">
            <span class="pulse"></span> System: Building in progress
        </div>

        <h1>G. Moschese</h1>
        <div class="role">Software Developer & Tech Enthusiast</div>
        
        <div class="divider"></div>

        <div class="message">
            Currently architecting a new digital environment. <br>
            A minimal space focused on logic and design.
        </div>

        <footer>
            &copy; 2026 &mdash; Built with GitHub Pages
        </footer>
    </div>
</body>
</html>
