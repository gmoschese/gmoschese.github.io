<div class="brand-visual">
    <div id="neural-tooltip" class="neural-tooltip"></div>
    <svg class="neural-svg" width="120" height="300" viewBox="0 0 120 300" xmlns="http://www.w3.org/2000/svg">
        <g class="connections">
            <!-- Connessioni invariate -->
            <line class="synapse" x1="30" y1="50" x2="20" y2="120" />
            <line class="synapse" x1="30" y1="50" x2="60" y2="120" />
            <line class="synapse" x1="30" y1="50" x2="100" y2="120" />
            <line class="synapse" x1="90" y1="50" x2="20" y2="120" />
            <line class="synapse" x1="90" y1="50" x2="60" y2="120" />
            <line class="synapse" x1="90" y1="50" x2="100" y2="120" />
            <line class="synapse" x1="20" y1="120" x2="20" y2="190" />
            <line class="synapse" x1="20" y1="120" x2="60" y2="190" />
            <line class="synapse" x1="60" y1="120" x2="20" y2="190" />
            <line class="synapse" x1="60" y1="120" x2="100" y2="190" />
            <line class="synapse" x1="100" y1="120" x2="60" y2="190" />
            <line class="synapse" x1="100" y1="120" x2="100" y2="190" />
            <line class="synapse" x1="20" y1="190" x2="30" y2="260" />
            <line class="synapse" x1="20" y1="190" x2="90" y2="260" />
            <line class="synapse" x1="60" y1="190" x2="30" y2="260" />
            <line class="synapse" x1="60" y1="190" x2="90" y2="260" />
            <line class="synapse" x1="100" y1="190" x2="30" y2="260" />
            <line class="synapse" x1="100" y1="190" x2="90" y2="260" />
        </g>
        <g class="nodes">
            <!-- Nodi Interattivi -->
            <circle class="neuron interactive" cx="30" cy="50" r="6" data-label="// STACK" onclick="window.location.hash='stack'" />
            <circle class="neuron interactive" cx="90" cy="50" r="6" data-label="// LAB" onclick="window.location.hash='lab'" />
            
            <!-- Nodi di transizione (non cliccabili) -->
            <circle class="neuron" cx="20" cy="120" r="4.5" />
            <circle class="neuron" cx="60" cy="120" r="4.5" />
            <circle class="neuron" cx="100" cy="120" r="4.5" />
            <circle class="neuron" cx="20" cy="190" r="4.5" />
            <circle class="neuron" cx="60" cy="190" r="4.5" />
            <circle class="neuron" cx="100" cy="190" r="4.5" />
            
            <!-- Nodi Interattivi Finali -->
            <circle class="neuron interactive" cx="30" cy="260" r="6" data-label="// OPEN SOURCE" onclick="window.location.hash='os'" />
            <circle class="neuron interactive" cx="90" cy="260" r="6" data-label="// CONSOLE" onclick="window.location.hash='console'" />
        </g>
    </svg>
</div>
