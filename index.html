<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G. Moschese | Personal Site</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --secondary: #666666;
            --accent: #007aff;
            --bg: #fafafa;
        }

        body {
            font-family: -apple-system, system-ui, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
            -webkit-font-smoothing: antialiased;
        }

        .container {
            text-align: left;
            padding: 2rem;
            max-width: 500px;
            animation: fadeIn 1s ease-in;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 3rem;
            margin: 0;
            font-weight: 700;
            letter-spacing: -2px;
        }

        .role {
            font-size: 1.1rem;
            color: var(--secondary);
            margin-top: 0.5rem;
            font-weight: 400;
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: var(--accent);
            margin: 2rem 0;
        }

        .status-box {
            display: inline-flex;
            align-items: center;
            background: #eee;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #444;
        }

        .pulse {
            height: 8px;
            width: 8px;
            background-color: #2ecc71;
            border-radius: 50%;
            margin-right: 8px;
            box-shadow: 0 0 0 rgba(46, 204, 113, 0.4);
            animation: pulse-animation 2s infinite;
        }

        @keyframes pulse-animation {
            0% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(46, 204, 113, 0); }
            100% { box-shadow: 0 0 0 0px rgba(46, 204, 113, 0); }
        }

        .message {
            line-height: 1.8;
            font-size: 1.1rem;
            color: var(--secondary);
        }

        footer {
            margin-top: 4rem;
            font-size: 0.75rem;
            color: #ccc;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="status-box">
            <span class="pulse"></span> Building in progress
        </div>
        <h1>Giovanni Moschese</h1>
        <div class="role">Software Developer & Tech Enthusiast</div>
        
        <div class="divider"></div>

        <div class="message">
            Currently crafting a new digital experience. <br>
            Stay tuned for updates.
        </div>

        <footer>
            &copy; 2026 &mdash; London / Remote
        </footer>
    </div>
</body>
</html>
