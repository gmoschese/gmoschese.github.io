<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G. Moschese | Personal Site</title>
    <style>
        :root {
            --primary: #2d3436;
            --accent: #0984e3;
            --bg: #ffffff;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: var(--bg);
            color: var(--primary);
        }

        .card {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            letter-spacing: -1px;
        }

        .tagline {
            color: var(--accent);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            margin-bottom: 2rem;
            display: block;
        }

        .content {
            line-height: 1.6;
            font-size: 1.1rem;
            color: #636e72;
        }

        .status-dot {
            height: 10px;
            width: 10px;
            background-color: #55efc4;
            border-radius: 50%;
            display: inline-block;
            margin-right: 5px;
        }

        footer {
            margin-top: 3rem;
            font-size: 0.8rem;
            color: #b2bec3;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>G. Moschese</h1>
        <span class="tagline">Personal Space</span>
        
        <div class="content">
            <p><span class="status-dot"></span> Attualmente sto costruendo qualcosa di nuovo.</p>
            <p>Appassionato di tecnologia e sviluppatore del progetto <strong>Lockal</strong>.</p>
        </div>

        <footer>
            &copy; 2026 — Built with GitHub Pages
        </footer>
    </div>
</body>
</html>
