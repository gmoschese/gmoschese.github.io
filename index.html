<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giovanni Moschese | Allungo</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="container">
        <header>
            <div class="brand-visual">
                <svg class="neural-svg" viewBox="0 0 100 180">
                    <line class="synapse-strong" x1="40" y1="10" x2="60" y2="10" />
                    <line class="synapse" x1="40" y1="10" x2="40" y2="25" />
                    <line class="synapse" x1="60" y1="10" x2="60" y2="25" />
                    <line class="synapse-strong" x1="30" y1="25" x2="70" y2="25" />
                    <line class="synapse" x1="50" y1="25" x2="50" y2="45" />
                    <line class="synapse-strong" x1="50" y1="45" x2="50" y2="70" />
                    <line class="synapse" x1="50" y1="70" x2="35" y2="160" />
                    <line class="synapse-strong" x1="50" y1="70" x2="65" y2="160" />
                    <circle class="neuron" cx="40" cy="10" r="2.5" />
                    <circle class="neuron" cx="60" cy="10" r="2.5" />
                    <circle class="neuron" cx="30" cy="25" r="2.5" />
                    <circle class="neuron" cx="70" cy="25" r="2.5" />
                    <circle class="neuron" cx="50" cy="45" r="3.5" />
                    <circle class="neuron" cx="50" cy="70" r="2.5" />
                    <circle class="neuron" cx="35" cy="160" r="2.5" />
                    <circle class="neuron" cx="65" cy="160" r="2.5" />
                </svg>
            </div>

            <div class="hero-text">
                <div class="status-row">
                    <div class="status-box">
                        <span class="pulse"></span> System: Online
                    </div>
                </div>
                <div class="alias">Known as Allungo</div>
                <h1>Giovanni Moschese</h1>
                <p class="role">Software Developer & Tech Enthusiast</p>
            </div>
        </header>
        
        <main>
            <div class="divider"></div>
            <p class="message">
                Currently architecting a new digital environment.<br>
                A minimal space focused on logic and design.
            </p>
        </main>

        <footer>
            &copy; 2026 &mdash; Built with GitHub Pages
        </footer>
    </div>
</body>
</html>
